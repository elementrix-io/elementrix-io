worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 80;
    server_name _;

    # ✅ FIX: serve from html root (where index.html actually is)
    root  /usr/share/nginx/html/browser;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- API proxy routes (keep yours) ----
    location /job/v1/ { proxy_pass http://acess-control:9063/job/v1/; proxy_set_header Host apis-test.elementrix.io; }
    location /notification/ { proxy_pass http://acess-control:9063/notification/; proxy_set_header Host apis-test.elementrix.io; }
    location /admin/v1/ { proxy_pass http://acess-control:9063/admin/v1/; proxy_set_header Host apis-test.elementrix.io; }
    location /ingestion/ { proxy_pass http://acess-control:9063/ingestion/; proxy_set_header Host apis-test.elementrix.io; }
    location /v1/ { proxy_pass http://acess-control:9063/v1/; proxy_set_header Host apis-test.elementrix.io; }
    location /actuator/ { proxy_pass http://acess-control:9063/actuator/; proxy_set_header Host apis-test.elementrix.io; }

    # Static caching
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|otf)$ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ✅ SPA fallback LAST
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}

