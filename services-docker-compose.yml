services:
  kafka:
    image: confluentinc/cp-kafka:8.1.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - elementrix
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

  connect:
    image: quay.io/debezium/connect:3.3
    container_name: connect
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "1"
      CONFIG_STORAGE_TOPIC: "my_connect_configs"
      OFFSET_STORAGE_TOPIC: "my_connect_offsets"
      STATUS_STORAGE_TOPIC: "my_connect_status"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
    networks:
      - elementrix
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    tmpfs:
      - /kafka/logs:size=512m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s

  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: elementrix
      POSTGRES_USER: elementrix
      POSTGRES_PASSWORD: "ewlet123$5EL"
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_connections=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - elementrix
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elementrix -d elementrix -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: redis:latest
    container_name: redis
    command: ["redis-server", "--requirepass", "fLnZNHY9V", "--bind", "0.0.0.0"]
    ports:
      - "6379:6379"
    restart: always
    networks:
      - elementrix
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 -a fLnZNHY9V ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 10s
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.1
    container_name: elasticsearch-elk
    environment:
      - node.name=elasticsearch
      - cluster.name=elementrix
      - discovery.type=single-node
      - network.host=0.0.0.0
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=sdf-110-dwt
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elementrix
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:sdf-110-dwt http://localhost:9200/_cluster/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    container_name: keycloak
    command:
      - start-dev
      - --http-enabled=true
      - --http-host=0.0.0.0
      - --hostname-strict=false
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASS:-admin}
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./elementrix-realm.json:/opt/keycloak/data/import/elementrix-realm.json:ro
    restart: unless-stopped
    networks:
      - elementrix
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "sh -c 'exec 3<>/dev/tcp/localhost/8080; printf \"GET /realms/master HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3; head -n 1 <&3 | grep -q \"200\"'"
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 90s
  # Auto-fix: master realm SSL required -> NONE (so HTTP works)
  keycloak-init:
    image: curlimages/curl:8.6.0
    container_name: keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KC_URL: http://keycloak:8080
      KC_ADMIN_USER: ${KC_ADMIN_USER:-admin}
      KC_ADMIN_PASS: ${KC_ADMIN_PASS:-admin}
      TARGET_REALM: elementrix
      TARGET_CLIENT_ID: admin-service
    command:
      - sh
      - -ec
      - |
        echo "Keycloak init: waiting for master realm..."
        until curl -fsS "$$KC_URL/realms/master" >/dev/null; do
          sleep 2
        done

        echo "Keycloak init: getting admin token..."
        RESP="$$(curl -fsS \
          -d client_id=admin-cli \
          -d username="$$KC_ADMIN_USER" \
          -d password="$$KC_ADMIN_PASS" \
          -d grant_type=password \
          "$$KC_URL/realms/master/protocol/openid-connect/token")"

        TOKEN="$${RESP#*\"access_token\":\"}"
        TOKEN="$${TOKEN%%\"*}"

        if [ -z "$$TOKEN" ] || [ "$$TOKEN" = "$$RESP" ]; then
          echo "Keycloak init: token empty / parse failed"
          echo "Response was: $$RESP"
          exit 1
        fi

        # -------------------------------
        # 1) master realm: sslRequired=NONE
        # -------------------------------
        echo "Keycloak init: checking master realm sslRequired..."
        CUR="$$(curl -fsS -H "Authorization: Bearer $$TOKEN" "$$KC_URL/admin/realms/master" \
          | tr -d '\n' \
          | sed 's/.*"sslRequired":"\([^"]*\)".*/\1/')"
        echo "Keycloak init: master sslRequired=$$CUR"

        if [ "$$CUR" != "NONE" ]; then
          echo "Keycloak init: setting master sslRequired=NONE..."
          curl -fsS -X PUT "$$KC_URL/admin/realms/master" \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"sslRequired":"NONE"}' >/dev/null
        else
          echo "Keycloak init: master sslRequired already NONE."
        fi

        # ---------------------------------------------------------
        # 2) elementrix realm: enable Direct Access Grants on client
        # ---------------------------------------------------------
        echo "Keycloak init: enabling Direct Access Grants for client '$$TARGET_CLIENT_ID' in realm '$$TARGET_REALM'..."

        # Find the internal client UUID by clientId
        CLIENT_UUID="$$(curl -fsS -H "Authorization: Bearer $$TOKEN" \
          "$$KC_URL/admin/realms/$$TARGET_REALM/clients?clientId=$$TARGET_CLIENT_ID" \
          | tr -d '\n' | sed 's/.*"id":"\([^"]*\)".*/\1/')"

        if [ -z "$$CLIENT_UUID" ] || [ "$$CLIENT_UUID" = "$$TARGET_CLIENT_ID" ]; then
          echo "Keycloak init: could not find client '$$TARGET_CLIENT_ID' in realm '$$TARGET_REALM'"
          exit 1
        fi

        # Get current setting (optional, for logging)
        CURRENT_DAG="$$(curl -fsS -H "Authorization: Bearer $$TOKEN" \
          "$$KC_URL/admin/realms/$$TARGET_REALM/clients/$$CLIENT_UUID" \
          | tr -d '\n' | sed 's/.*"directAccessGrantsEnabled":\([^,}]*\).*/\1/')"
        echo "Keycloak init: directAccessGrantsEnabled currently = $$CURRENT_DAG"

        # Enable it (idempotent)
        curl -fsS -X PUT "$$KC_URL/admin/realms/$$TARGET_REALM/clients/$$CLIENT_UUID" \
          -H "Authorization: Bearer $$TOKEN" \
          -H "Content-Type: application/json" \
          --data '{"directAccessGrantsEnabled":true}' >/dev/null

        echo "Keycloak init: done."
    networks:
      - elementrix
    restart: "no"


networks:
  elementrix:
    name: elementrix
    external: true

volumes:
  kafka-data: {}
  postgres_data: {}
  elasticsearch_data: {}
  keycloak_data: {}
